name: daily-digest

on:
  schedule:
    - cron: "0 1 * * *" # 01:00 UTC daily (~08:00 WIB)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: jobradar-daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: jobradar-seen-${{ github.run_id }}
          restore-keys: |
            jobradar-seen-

      - name: Run JobRadar
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: go run . -config config.yaml

      - name: Debug seen.json
        if: always()
        run: |
          ls -la seen.json && wc -l seen.json || echo "seen.json NOT FOUND"
