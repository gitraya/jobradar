# JobRadar config. Copy to config.yaml and edit. No code changes needed.

roles:                       # F3 — keep jobs matching ANY of these (case-insensitive).
  - software engineer        #      Remotive's category filter is loose (it still returns
  - developer                #      sales/writing roles), so this narrows to actual dev work.
  - backend
  - frontend
  - front end
  - full stack
  - golang
  - react
  - node

block_terms:                 # F4 — drop jobs matching ANY of these (title/location/tags)
  - us only
  - us-only
  - authorized to work in
  - h-1b
  - eu only
  - visa sponsorship not

locations:                   # F4 — allow-list on candidate_required_location. Keep only these
  - worldwide                #      (substring match); an empty location is always kept.
  - asia                     #      Empty list disables the filter.
  - apac
  - indonesia

sources:                     # F1 — enable/disable per board
  remotive: true
  himalayas: true

remotive_category: software-development  # Remotive category slug to query
remotive_location: worldwide             # Remotive location param (a loose server-side hint)

# Himalayas has no server-side filter and is high-volume; it pages newest-first
# and stops at the freshness cutoff. This caps how far back a single run may page
# (each page is 20 jobs). Raise it if a wide freshness_hours misses older jobs.
himalayas_max_jobs: 2000

freshness_hours: 720         # F2 — keep only jobs newer than this; 0 disables
dedupe_across_days: true     # F6 — skip jobs already delivered (seen.json)
rank_worldwide_first: true   # F10 — surface worldwide/anywhere roles first
seen_path: seen.json         # where the cross-day cache is stored

delivery:
  discord:
    enabled: true            # F7 — webhook URL from env DISCORD_WEBHOOK_URL
  gmail:
    enabled: false           # F8 — creds from env GMAIL_USERNAME / GMAIL_APP_PASSWORD / GMAIL_TO

ai:
  enabled: false             # F12/F13 — off until budget exists
