services:
  jobradar:
    build: .
    image: jobradar:latest
    container_name: jobradar
    # Options & secrets. Locally these interpolate from ./.env automatically;
    # on Coolify set them in the resource's Environment Variables UI.
    # RUN_AT enables daily daemon mode (UTC); clear it to run once and exit.
    environment:
      RUN_AT: ${RUN_AT:-01:00}
      RUN_ON_START: ${RUN_ON_START:-false}
      DRY_RUN: ${DRY_RUN:-false}
      SEEN_PATH: /data/seen.json
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      GMAIL_USERNAME: ${GMAIL_USERNAME:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_TO: ${GMAIL_TO:-}
    volumes:
      # Edit config on the host; no rebuild needed. (The image also bakes a copy,
      # so on Coolify you can drop this bind and just redeploy to change config.)
      - ./config.yaml:/app/config.yaml:ro
      # Cross-day cache (seen.json) on a persistent named volume.
      - jobradar_state:/data
    restart: unless-stopped

volumes:
  jobradar_state:
