services:
  jobradar:
    build: .
    image: jobradar:latest
    container_name: jobradar
    # Secrets: DISCORD_WEBHOOK_URL, GMAIL_USERNAME, GMAIL_APP_PASSWORD, GMAIL_TO
    env_file:
      - .env
    environment:
      # Daemon mode: run every day at this UTC time. Comment out / unset RUN_AT
      # to run once and exit instead (drive it with host cron).
      RUN_AT: "01:00"
      RUN_ON_START: "false"
      # DRY_RUN: "true"   # uncomment to test without delivering
    volumes:
      # Your config, read-only. Edit on the host; no rebuild needed.
      - ./config.yaml:/app/config.yaml:ro
      # Persistent cross-day cache (seen.json) lives in this named volume so it
      # survives restarts. config.yaml's seen_path stays the default "seen.json".
      - jobradar_state:/app
    restart: unless-stopped

volumes:
  jobradar_state:
